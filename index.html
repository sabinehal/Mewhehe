<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e1420">
<title>happy birthday, smol</title>

<script>
  /* ============ CONFIG — edit these to personalize ============ */
  window.CONFIG = {
    name: "Jory",
    nickname: "smol",
    date: "July 5",
    // Reasons — edit freely, add or remove as many as you want.
    reasons: [
      "The way you say goodnight even when it's already morning for me.",
      "You remember the small things I mention once.",
      "Every time zone math is worth it.",
      "Your laugh over a bad connection still sounds like home.",
      "You make far away feel temporary."
    ],
    // The final message.
    message: "Happy Birthday, My Smol Baby!\n\nYou're the type of person who can make me feel good no matter what I'm feeling. You always make me happy, always comfort me, and I like when u try to annoy me but always fail haha.\n\nSince we met, we always end up in problems — either caused by us or by others. And yk, I was actually surprised when I found out you really loved me. I was like, is it even real or just a dream haha. And in December you nearly gave me a heart attack cause u were about to leave... but all fixed now.\n\nFor the upcoming year, I want you to leave your laziness and too much games and become a responsible person, and also a good wife.\n\nHappy birthday again. You deserve the world and I will do everything to make you happy. And sorry cause I annoy you — dw, it will happen again \uD83D\uDE44\n\nWell..... about the gift — I saved 100 usd, of which I'll only be able to send you 40%. But I promise, next time I'll do everything to send you something real, since I'll have my own credit card by then.\n\nAnd happy birthday again, my smol baby — and I want sooo much picssssss \uD83D\uDC3E",
    signOff: "always yours"
  };
</script>

<style>
  :root{
    --ink: #eef1f6;
    --ink-dim: #aab4c4;
    --night: #0e1420;
    --night-2: #141c2c;
    --dusk-blue: #7f92aa;
    --gold: #c9a668;
    --gold-soft: #e4cd9a;
    --line: rgba(238,241,246,0.12);
    --serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono: 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace;
  }

  *{ box-sizing: border-box; }
  html{
    scroll-behavior: smooth;
    background: #090d15;
    overscroll-behavior: none;
  }
  body{
    margin:0;
    background: radial-gradient(ellipse 120% 80% at 50% -10%, #1a2436 0%, var(--night) 55%, #090d15 100%);
    background-color: #090d15;
    color: var(--ink);
    font-family: var(--sans);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- scroll progress ---------- */
  #progress{
    position: fixed; top: 0; left: 0; height: 2px; width: 0%;
    background: linear-gradient(90deg, transparent, var(--gold-soft), var(--gold));
    z-index: 50; pointer-events: none;
    box-shadow: 0 0 10px rgba(228,205,154,0.6);
    transition: width 0.1s linear;
  }

  /* ---------- ambient layers ---------- */
  #aurora{
    position: fixed; inset: -20% 0 auto 0; height: 70vh; z-index: 0; pointer-events: none;
    background:
      radial-gradient(45% 60% at 25% 0%, rgba(127,146,170,0.16), transparent 70%),
      radial-gradient(45% 60% at 75% 0%, rgba(201,166,104,0.12), transparent 70%);
    filter: blur(20px);
    animation: auroraShift 16s ease-in-out infinite alternate;
  }
  @keyframes auroraShift{
    0%{ transform: translateX(-4%) scale(1); opacity: 0.8; }
    100%{ transform: translateX(4%) scale(1.08); opacity: 1; }
  }

  /* crescent moon in the hero sky */
  #moon{
    position: fixed; top: 8vh; right: 10vw; z-index: 0; pointer-events: none;
    width: 54px; height: 54px; border-radius: 50%;
    background: radial-gradient(circle at 62% 40%, #fbf4de, #d9cba0 70%);
    box-shadow: -8px 6px 0 -2px var(--night) inset, 0 0 40px rgba(228,205,154,0.35);
    opacity: 0.9;
    animation: moonFloat 9s ease-in-out infinite;
  }
  @keyframes moonFloat{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-8px); }
  }

  #stars, #dust, #paws, #shooting{
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  #stars span{
    position: absolute; border-radius: 50%;
    background: #fff; opacity: 0.5;
    animation: twinkle 4s ease-in-out infinite;
  }
  #stars span.big{ box-shadow: 0 0 6px 1px rgba(255,255,255,0.7); }
  @keyframes twinkle{
    0%,100%{ opacity: 0.12; transform: scale(0.85); }
    50%{ opacity: 0.9; transform: scale(1); }
  }

  #dust span{
    position: absolute; bottom: -10px; width: 3px; height: 3px; border-radius: 50%;
    background: radial-gradient(circle, rgba(228,205,154,0.9), rgba(228,205,154,0));
    animation: floatDust linear infinite;
  }
  @keyframes floatDust{
    0%{ transform: translateY(0) translateX(0); opacity: 0; }
    10%{ opacity: 0.8; }
    90%{ opacity: 0.6; }
    100%{ transform: translateY(-110vh) translateX(30px); opacity: 0; }
  }

  /* drifting paw prints */
  #paws span{
    position: absolute; bottom: -30px;
    font-size: 16px; color: var(--dusk-blue);
    opacity: 0; animation: floatPaw linear infinite;
    filter: drop-shadow(0 0 4px rgba(127,146,170,0.4));
  }
  @keyframes floatPaw{
    0%{ transform: translateY(0) rotate(0deg); opacity: 0; }
    12%{ opacity: 0.5; }
    88%{ opacity: 0.4; }
    100%{ transform: translateY(-116vh) rotate(25deg); opacity: 0; }
  }

  .shootingstar{
    position: absolute;
    width: 2px; height: 2px; border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 6px 2px rgba(255,255,255,0.8);
  }
  .shootingstar::after{
    content:''; position: absolute; top: 50%; right: 2px;
    width: 120px; height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.9), transparent);
    transform: translateY(-50%);
  }

  section{
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 90px 24px;
    text-align: center;
  }

  @keyframes riseIn{
    from{ opacity: 0; transform: translateY(22px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .eyebrow{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--dusk-blue);
    margin-bottom: 22px;
    opacity: 0;
    animation: riseIn 0.9s ease forwards;
    animation-delay: 0.1s;
  }

  h1.title{
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(48px, 11vw, 96px);
    line-height: 1.05;
    margin: 0 0 8px 0;
    color: var(--ink);
  }
  h1.title .ch{
    display: inline-block;
    opacity: 0;
    filter: blur(8px);
    transform: translateY(18px);
    animation: charIn 0.7s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes charIn{
    to{ opacity: 1; filter: blur(0); transform: translateY(0); }
  }
  h1.title .nick{ font-style: italic; color: var(--gold-soft); }
  h1.title .nick.lit{ animation: nickGlow 3.5s ease-in-out infinite; }
  @keyframes nickGlow{
    0%,100%{ text-shadow: 0 0 0px rgba(228,205,154,0); }
    50%{ text-shadow: 0 0 22px rgba(228,205,154,0.6); }
  }
  h1.title .quote{ color: var(--dusk-blue); opacity: 0.6; }

  .date{
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    margin-bottom: 64px;
    opacity: 0;
    animation: riseIn 1s ease forwards;
    animation-delay: 1.4s;
    position: relative;
  }
  .date::after{
    content:''; display: block; width: 0; height: 1px;
    background: var(--dusk-blue); margin: 14px auto 0; opacity: 0.5;
    animation: growLine 1s ease forwards; animation-delay: 1.9s;
  }
  @keyframes growLine{ to{ width: 40px; } }

  /* ---------- candle + cat ---------- */
  #candle-scene{
    position: relative;
    width: 220px; height: 240px;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0;
    animation: riseIn 1.1s ease forwards; animation-delay: 0.8s;
  }
  #candle-wrap{
    position: relative;
    width: 140px; height: 220px;
    cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
    animation: floatCandle 5s ease-in-out infinite; animation-delay: 2s;
    transition: transform 0.2s ease;
  }
  #candle-wrap:active{ transform: scale(0.96); }
  @keyframes floatCandle{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-6px); }
  }

  /* sitting cat watching the flame */
  #hero-cat{
    position: absolute; right: -8px; bottom: 0;
    width: 78px; height: 92px;
    pointer-events: none;
    filter: drop-shadow(0 0 6px rgba(228,205,154,0.35));
    transition: filter 0.7s ease, opacity 0.7s ease;
  }
  #hero-cat.dim{ filter: none; opacity: 0.85; }
  #hero-cat .tail{ transform-origin: 72px 78px; animation: tailSway 3.4s ease-in-out infinite; }
  @keyframes tailSway{
    0%,100%{ transform: rotate(0deg); }
    50%{ transform: rotate(-10deg); }
  }
  #hero-cat .eye{ animation: blink 5s infinite; transform-origin: center; }
  @keyframes blink{
    0%,94%,100%{ transform: scaleY(1); }
    97%{ transform: scaleY(0.1); }
  }

  .halo{
    position: absolute; left: 50%; top: 20px;
    width: 190px; height: 190px; transform: translate(-50%,-50%);
    background: radial-gradient(circle, rgba(228,205,154,0.28) 0%, rgba(228,205,154,0) 68%);
    border-radius: 50%; filter: blur(6px);
    animation: haloBreath 3.6s ease-in-out infinite;
    transition: opacity 0.7s ease;
  }
  @keyframes haloBreath{
    0%,100%{ transform: translate(-50%,-50%) scale(1); opacity: 0.75; }
    50%{ transform: translate(-50%,-50%) scale(1.12); opacity: 1; }
  }
  .glow{
    position: absolute; left: 50%; top: 8px;
    width: 90px; height: 90px; transform: translate(-50%,-50%);
    background: radial-gradient(circle, rgba(228,205,154,0.55) 0%, rgba(228,205,154,0) 70%);
    border-radius: 50%; filter: blur(2px);
    transition: opacity 0.6s ease;
    animation: glowPulse 2.4s ease-in-out infinite;
  }
  @keyframes glowPulse{ 0%,100%{ opacity: 0.85; } 50%{ opacity: 1; } }
  .flame-outer{
    position: absolute; left: 50%; top: 0px;
    width: 22px; height: 46px; transform: translate(-50%,0);
    background: radial-gradient(circle at 50% 70%, rgba(255,180,80,0.55), rgba(255,120,40,0) 70%);
    border-radius: 50%; transform-origin: bottom center; filter: blur(1px);
    animation: flicker 2.4s ease-in-out infinite;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .flame{
    position: absolute; left: 50%; top: 6px;
    width: 14px; height: 34px; transform: translate(-50%,0);
    background: linear-gradient(180deg, #fff6dd 0%, var(--gold-soft) 45%, var(--gold) 80%);
    border-radius: 50% 50% 50% 50% / 65% 65% 40% 40%;
    transform-origin: bottom center;
    animation: flicker 2.2s ease-in-out infinite;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .flame-core{
    position: absolute; left: 50%; top: 16px;
    width: 6px; height: 16px; transform: translate(-50%,0);
    background: linear-gradient(180deg, #ffffff, #ffe9b8);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    transform-origin: bottom center; filter: blur(0.4px);
    animation: flicker 1.8s ease-in-out infinite reverse;
    transition: opacity 0.4s ease;
  }
  @keyframes flicker{
    0%,100%{ transform: translate(-50%,0) scaleY(1) rotate(0deg); }
    25%{ transform: translate(-52%,0) scaleY(1.06) rotate(-2.5deg); }
    50%{ transform: translate(-49%,0) scaleY(0.95) rotate(1.5deg); }
    75%{ transform: translate(-51%,0) scaleY(1.03) rotate(-1deg); }
  }
  .wick{
    position: absolute; left: 50%; top: 30px; width: 3px; height: 12px;
    background: #3a3226; transform: translateX(-50%);
  }
  .candle-body{
    position: absolute; left: 50%; top: 40px; bottom: 0; width: 46px;
    transform: translateX(-50%);
    background: linear-gradient(90deg, #fdfaf3 0%, #f3ecd9 45%, #e6dcc2 100%);
    border-radius: 6px 6px 3px 3px;
    box-shadow: inset -6px 0 10px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .candle-body::after{
    content:''; position:absolute; top:0; left:50%; width:60px; height:60px;
    transform: translate(-50%,-30%);
    background: radial-gradient(circle, rgba(255,220,150,0.5), transparent 70%);
    transition: opacity 0.6s ease;
  }
  .candle-body.dim::after{ opacity: 0; }
  .candle-body::before{
    content:''; position:absolute; top:-6px; left:0; right:0; height:12px;
    background: #fdfaf3; border-radius: 50%; z-index: 2;
  }
  .smoke{
    position: absolute; left: 50%; top: 0; width: 6px; height: 6px;
    border-radius: 50%; background: rgba(200,200,210,0.5);
    opacity: 0; transform: translate(-50%,0);
  }
  .ember{
    position: absolute; left: 50%; top: 12px;
    width: 3px; height: 3px; border-radius: 50%;
    background: var(--gold-soft);
    box-shadow: 0 0 5px 1px rgba(228,205,154,0.9);
    pointer-events: none; opacity: 0;
  }
  .hint{
    margin-top: 26px;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-dim); opacity: 0;
    transition: opacity 0.6s ease;
    animation: hintFade 2s ease infinite; animation-delay: 1.6s;
  }
  @keyframes hintFade{ 0%,100%{ opacity: 0.35; } 50%{ opacity: 0.85; } }
  .sparkle{
    position: absolute; left: 50%; top: 10px;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--gold-soft);
    box-shadow: 0 0 6px 1px rgba(228,205,154,0.8);
    pointer-events: none;
  }

  #burst{ position: fixed; inset: 0; z-index: 40; pointer-events: none; overflow: hidden; }
  .confetti, .glyph-bit{ position: absolute; will-change: transform, opacity; }
  .confetti{ width: 8px; height: 12px; border-radius: 2px; }
  .glyph-bit{ font-size: 18px; line-height: 1; color: var(--gold-soft); text-shadow: 0 0 8px rgba(228,205,154,0.6); }

  #flash{
    position: fixed; inset: 0; z-index: 39; pointer-events: none;
    background: radial-gradient(circle at 50% 42%, rgba(255,240,210,0.5), transparent 55%);
    opacity: 0;
  }

  #wish{
    max-width: 480px; opacity: 0; transform: translateY(10px);
    transition: opacity 1s ease, transform 1s ease; margin-top: 30px;
  }
  #wish.show{ opacity: 1; transform: translateY(0); }
  #wish p{
    font-family: var(--serif); font-style: italic;
    font-size: 19px; line-height: 1.6; color: var(--dusk-blue); margin: 0;
  }

  .constellation{
    margin-top: 34px; opacity: 0;
    transition: opacity 1.4s ease 0.3s;
  }
  .constellation.show{ opacity: 1; }
  .constellation svg{ width: 240px; height: 110px; }
  .constellation circle{ filter: drop-shadow(0 0 4px rgba(228,205,154,0.85)); }
  .cat-caption{
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--dusk-blue); margin-top: 4px; opacity: 0.7;
  }

  /* ---------- section headers ---------- */
  .reveal{ opacity: 0; transform: translateY(28px); transition: opacity 0.9s ease, transform 0.9s ease; }
  .reveal.in{ opacity: 1; transform: translateY(0); }

  .section-label{
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 6px;
  }
  h2.section-title{
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(30px, 6vw, 46px); margin: 0 0 60px 0; color: var(--ink);
  }
  .sub{
    font-family: var(--serif); font-style: italic; color: var(--ink-dim);
    font-size: 16px; margin-top: -46px; margin-bottom: 60px;
  }

  /* ---------- reasons ---------- */
  .reasons{ max-width: 640px; width: 100%; display: flex; flex-direction: column; gap: 0; }
  .reason{
    display: flex; gap: 20px; align-items: flex-start; text-align: left;
    padding: 26px 4px; border-top: 1px solid var(--line);
    opacity: 0; transform: translateX(-16px);
    transition: opacity 0.7s ease, transform 0.7s ease, background 0.3s ease;
    position: relative;
  }
  .reason::before{
    content:''; position: absolute; top: -1px; left: 0; height: 1px; width: 0;
    background: linear-gradient(90deg, var(--gold), transparent);
    transition: width 0.9s ease;
  }
  .reason.in{ opacity: 1; transform: translateX(0); }
  .reason.in::before{ width: 100%; }
  .reason:hover{ background: rgba(255,255,255,0.02); }
  .reason:last-child{ border-bottom: 1px solid var(--line); }
  .reason .mark{
    font-family: var(--serif); font-style: italic; font-size: 26px;
    color: var(--gold); line-height: 1; flex-shrink: 0; width: 20px;
    transition: transform 0.3s ease, color 0.3s ease;
  }
  .reason:hover .mark{ transform: scale(1.25) rotate(-6deg); color: var(--gold-soft); }
  .reason p{ font-family: var(--serif); font-size: 19px; line-height: 1.5; color: var(--ink); margin: 0; }

  /* ---------- final message ---------- */
  .final-label{
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--dusk-blue); margin-bottom: 30px;
  }
  .message{
    max-width: 540px; font-family: var(--serif);
    font-size: clamp(20px, 3.6vw, 26px); line-height: 1.7; color: var(--ink);
    white-space: pre-line;
  }
  .signoff{
    margin-top: 46px; font-family: var(--serif); font-style: italic;
    color: var(--gold-soft); font-size: 20px; opacity: 0; transform: translateY(10px);
    transition: opacity 1s ease 0.4s, transform 1s ease 0.4s;
  }
  .signoff.in{ opacity: 1; transform: translateY(0); }

  /* ---------- envelope + letter ---------- */
  #final-section{ min-height: auto; justify-content: flex-start; padding: 300px 24px 80px; overflow: hidden; }
  #envelope-wrap{ perspective: 1400px; margin-top: 40px; position: relative; }
  .envelope{
    position: relative; width: 300px; max-width: 82vw; height: 200px; margin: 0 auto;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform 0.6s ease;
    perspective: 1200px;
  }
  .envelope:hover{ transform: translateY(-4px); }
  .envelope.open{ transform: translateY(6px) scale(0.99); }

  .env-back{
    position: absolute; inset: 0;
    background: linear-gradient(155deg, #1c2536, #131b2a);
    border: 1px solid var(--line); border-radius: 6px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.4); z-index: 1;
  }
  .env-pocket{
    position: absolute; left: 0; right: 0; bottom: 0; height: 100%;
    background: linear-gradient(155deg, #232f45, #182233);
    clip-path: polygon(0 100%, 50% 40%, 100% 100%);
    border-radius: 0 0 6px 6px; z-index: 3;
  }
  .env-flap{
    position: absolute; top: 0; left: 0; width: 0; height: 0;
    border-left: 150px solid transparent; border-right: 150px solid transparent;
    border-top: 95px solid #29354d; transform-origin: top center;
    transition: transform 0.9s cubic-bezier(.45,.05,.25,1) 0.55s; z-index: 4;
  }
  .envelope.open .env-flap{
    transform: rotateX(180deg); z-index: 0;
    transition: transform 0.9s cubic-bezier(.45,.05,.25,1) 0s;
  }
  .seal{
    position: absolute; top: 34px; left: 50%; transform: translate(-50%,0);
    width: 36px; height: 36px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-soft), var(--gold) 70%);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #3a2c12; box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    z-index: 5;
    transition: opacity 0.4s ease 1s, transform 0.45s cubic-bezier(.34,1.4,.5,1) 1s;
    animation: sealPulse 2.8s ease-in-out infinite;
  }
  @keyframes sealPulse{
    0%,100%{ box-shadow: 0 4px 10px rgba(0,0,0,0.35), 0 0 0 0 rgba(228,205,154,0.0); }
    50%{ box-shadow: 0 4px 10px rgba(0,0,0,0.35), 0 0 14px 2px rgba(228,205,154,0.45); }
  }
  .envelope.open .seal{
    opacity: 0; transform: translate(-50%,0) scale(0.5); animation: none;
    transition: opacity 0.3s ease 0s, transform 0.3s ease 0s;
  }

  /* letter folds down into the envelope when closed, unfolds & rises out when open */
  .letter-card{
    position: absolute; left: 50%; top: -260px; bottom: auto;
    width: 92%; min-height: 130px;
    transform-origin: 50% 100%;
    transform: translate(-50%, 40px) rotateX(90deg) scale(0.96);
    background: linear-gradient(180deg, #f7f3ea, #efe8d6);
    border-radius: 4px; box-shadow: 0 6px 14px rgba(0,0,0,0.22);
    padding: 28px 24px 24px; z-index: 2; opacity: 0;
    transition:
      transform 0.85s cubic-bezier(.5,0,.2,1) 0s,
      opacity 0.3s ease 0.35s,
      box-shadow 0.6s ease 0s;
    will-change: transform, opacity;
    backface-visibility: hidden;
  }
  .letter-card::before{
    content: '\1F408'; position: absolute; top: -14px; right: 16px;
    font-size: 22px; filter: grayscale(0.2) drop-shadow(0 2px 3px rgba(0,0,0,0.25));
    opacity: 0; transform: translateY(6px) scale(0.7);
    transition: opacity 0.35s ease 0s, transform 0.4s ease 0s;
  }
  .envelope.open .letter-card{
    opacity: 1;
    transform: translate(-50%, 0) rotateX(0deg) scale(1);
    box-shadow: 0 34px 66px rgba(0,0,0,0.5);
    z-index: 6;
    transition:
      transform 0.95s cubic-bezier(.2,1,.34,1) 0.42s,
      opacity 0.45s ease 0.5s,
      box-shadow 0.7s ease 0.5s;
  }
  .envelope.open .letter-card::before{
    opacity: 1; transform: translateY(0) scale(1);
    transition: opacity 0.5s ease 1.2s, transform 0.6s cubic-bezier(.22,1.3,.4,1) 1.2s;
  }
  .letter-card .message{ color: #2a2620; text-align: left; font-size: clamp(15px, 3.6vw, 17px); line-height: 1.7; }
  .letter-card .signoff{
    color: #7a5f2c; text-align: left; margin-top: 22px; font-size: 17px;
    opacity: 1; transform: none; transition: none;
  }
  .envelope-hint{
    margin-top: 22px; font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim);
    text-align: center; animation: hintFade 2s ease infinite; transition: opacity 0.5s ease;
  }
  .envelope-hint.hidden{ opacity: 0; }
  .signoff::before{ content: '—  '; }

  footer{
    text-align: center; padding: 40px 24px 60px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em;
    color: var(--ink-dim); opacity: 0.4;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001s !important; animation-iteration-count: 1 !important; transition-duration: 0.2s !important; }
    #aurora, #dust, #paws, #shooting{ display: none; }
  }
</style>
</head>
<body>

<div id="progress"></div>
<div id="aurora"></div>
<div id="moon"></div>
<div id="stars"></div>
<div id="dust"></div>
<div id="paws"></div>
<div id="shooting"></div>
<div id="flash"></div>
<div id="burst"></div>

<!-- HERO -->
<section id="hero">
  <div class="eyebrow">Happy Birthday</div>
  <h1 class="title" id="title-text"></h1>
  <div class="date" id="date-text"></div>

  <div id="candle-scene">
    <div id="candle-wrap">
      <div class="halo" id="halo"></div>
      <div class="glow" id="glow"></div>
      <div class="flame-outer" id="flame-outer"></div>
      <div class="flame" id="flame"></div>
      <div class="flame-core" id="flame-core"></div>
      <div class="wick"></div>
      <div class="candle-body" id="candle-body"></div>
    </div>
    <!-- little cat watching the flame -->
    <svg id="hero-cat" viewBox="0 0 100 100" fill="#7f92aa" aria-hidden="true">
      <g class="tail">
        <path d="M70 84 q26 4 20 -26 q-3 -15 -13 -11 q8 4 7 15 q-1 13 -14 10 z"/>
      </g>
      <path d="M28 90 q-5 -36 22 -36 q27 0 22 36 z"/>
      <circle cx="50" cy="48" r="16"/>
      <polygon points="37,38 31,15 51,31"/>
      <polygon points="63,38 69,15 49,31"/>
      <ellipse class="eye" cx="43" cy="47" rx="2.1" ry="3.1" fill="#0e1420"/>
      <ellipse class="eye" cx="57" cy="47" rx="2.1" ry="3.1" fill="#0e1420"/>
      <path d="M47 54 h6 l-3 3 z" fill="#0e1420"/>
    </svg>
  </div>
  <div class="hint" id="hint">tap the candle &amp; make a wish</div>

  <div id="wish">
    <p>Happy birthday, smol &#128062;</p>
  </div>

  <div class="constellation" id="constellation">
    <svg viewBox="0 0 240 110">
      <g transform="translate(20,12)">
        <line class="cat-line" x1="58" y1="20" x2="70" y2="38" stroke="#7f92aa" stroke-width="1"/>
        <line class="cat-line" x1="70" y1="38" x2="82" y2="38" stroke="#7f92aa" stroke-width="1"/>
        <line class="cat-line" x1="82" y1="38" x2="94" y2="20" stroke="#7f92aa" stroke-width="1"/>
        <line class="cat-line" x1="70" y1="38" x2="76" y2="52" stroke="#7f92aa" stroke-width="1"/>
        <line class="cat-line" x1="82" y1="38" x2="76" y2="52" stroke="#7f92aa" stroke-width="1"/>
        <line class="cat-line" x1="76" y1="52" x2="76" y2="70" stroke="#7f92aa" stroke-width="1"/>
        <line class="cat-line" x1="76" y1="70" x2="100" y2="70" stroke="#7f92aa" stroke-width="1"/>
        <line class="cat-line" x1="100" y1="70" x2="112" y2="54" stroke="#7f92aa" stroke-width="1"/>
        <line class="cat-line" x1="112" y1="54" x2="116" y2="38" stroke="#7f92aa" stroke-width="1"/>
        <circle cx="58" cy="20" r="2.6" fill="#e4cd9a"/>
        <circle cx="70" cy="38" r="2.2" fill="#e4cd9a"/>
        <circle cx="82" cy="38" r="2.2" fill="#e4cd9a"/>
        <circle cx="94" cy="20" r="2.6" fill="#e4cd9a"/>
        <circle cx="76" cy="52" r="2.4" fill="#e4cd9a"/>
        <circle cx="76" cy="70" r="2.2" fill="#e4cd9a"/>
        <circle cx="100" cy="70" r="2.2" fill="#e4cd9a"/>
        <circle cx="112" cy="54" r="2.2" fill="#e4cd9a"/>
        <circle cx="116" cy="38" r="2.6" fill="#e4cd9a"/>
      </g>
    </svg>
    <div class="cat-caption">your little cat, up in the stars</div>
  </div>
</section>

<!-- REASONS -->
<section id="reasons-section">
  <div class="section-label reveal">Our Little History</div>
  <h2 class="section-title reveal">a few reasons why</h2>
  <div class="reasons" id="reasons-list"></div>
</section>

<!-- FINAL -->
<section id="final-section">
  <div class="final-label reveal">Made With Love, Just For You</div>
  <div id="envelope-wrap">
    <div class="envelope" id="envelope">
      <div class="env-back"></div>
      <div class="letter-card">
        <div class="message" id="final-message"></div>
        <div class="signoff" id="final-signoff"></div>
      </div>
      <div class="env-pocket"></div>
      <div class="env-flap"></div>
      <div class="seal">&#128062;</div>
    </div>
  </div>
  <div class="envelope-hint" id="envelope-hint">tap to open the letter</div>
</section>

<footer>ONE MORE YEAR AROUND THE SUN &nbsp;&#183;&nbsp; &#128008;</footer>

<script>
(function(){
  const C = window.CONFIG;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- scroll progress ----
  const progress = document.getElementById('progress');
  function onScroll(){
    const h = document.documentElement;
    const scrolled = h.scrollTop / (h.scrollHeight - h.clientHeight || 1);
    progress.style.width = (scrolled * 100) + '%';
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  // ---- starfield ----
  const starsEl = document.getElementById('stars');
  for(let i=0;i<90;i++){
    const s = document.createElement('span');
    const big = Math.random() > 0.86;
    const size = big ? (Math.random()*1.5+2) : (Math.random()*1.4+1);
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    s.style.animationDelay = (Math.random()*4) + 's';
    s.style.animationDuration = (3 + Math.random()*3) + 's';
    s.style.width = s.style.height = size + 'px';
    if(big) s.classList.add('big');
    starsEl.appendChild(s);
  }

  // ---- floating light dust ----
  if(!reduce){
    const dustEl = document.getElementById('dust');
    for(let i=0;i<24;i++){
      const d = document.createElement('span');
      d.style.left = Math.random()*100 + '%';
      const dur = 14 + Math.random()*16;
      d.style.animationDuration = dur + 's';
      d.style.animationDelay = (-Math.random()*dur) + 's';
      d.style.transform = 'scale(' + (0.6 + Math.random()*1.4) + ')';
      dustEl.appendChild(d);
    }
    // drifting paw prints
    const pawsEl = document.getElementById('paws');
    for(let i=0;i<9;i++){
      const p = document.createElement('span');
      p.textContent = '\uD83D\uDC3E';
      p.style.left = Math.random()*100 + '%';
      const dur = 20 + Math.random()*18;
      p.style.animationDuration = dur + 's';
      p.style.animationDelay = (-Math.random()*dur) + 's';
      p.style.fontSize = (12 + Math.random()*10) + 'px';
      pawsEl.appendChild(p);
    }
  }

  // ---- shooting stars ----
  if(!reduce){
    const shootEl = document.getElementById('shooting');
    function shoot(){
      const st = document.createElement('div');
      st.className = 'shootingstar';
      st.style.left = (10 + Math.random()*70) + 'vw';
      st.style.top = (5 + Math.random()*35) + 'vh';
      const angle = 20 + Math.random()*15;
      st.style.transform = 'rotate(' + angle + 'deg)';
      shootEl.appendChild(st);
      const dist = 260 + Math.random()*180;
      st.animate([
        { transform: 'rotate('+angle+'deg) translateX(0)', opacity: 0 },
        { opacity: 1, offset: 0.15 },
        { transform: 'rotate('+angle+'deg) translateX('+dist+'px)', opacity: 0 }
      ], { duration: 900 + Math.random()*500, easing: 'ease-out' });
      setTimeout(function(){ st.remove(); }, 1600);
      setTimeout(shoot, 4000 + Math.random()*6000);
    }
    setTimeout(shoot, 2500);
  }

  // ---- title (letter-by-letter blur-in) ----
  const titleEl = document.getElementById('title-text');
  function appendChars(text, cls, startDelay, step){
    let delay = startDelay;
    const wrap = document.createElement('span');
    if(cls) wrap.className = cls;
    for(const chr of text){
      const span = document.createElement('span');
      span.className = 'ch';
      span.textContent = chr;
      span.style.animationDelay = delay.toFixed(2) + 's';
      wrap.appendChild(span);
      delay += step;
    }
    titleEl.appendChild(wrap);
    return { delay: delay, wrap: wrap };
  }
  let t = 0.35, step = 0.05, r;
  r = appendChars(C.name + ' ', null, t, step); t = r.delay;
  r = appendChars('\u201C', 'quote', t, step); t = r.delay;
  const nickRes = appendChars(C.nickname, 'nick', t, step); t = nickRes.delay;
  r = appendChars('\u201D', 'quote', t, step); t = r.delay;
  setTimeout(function(){ nickRes.wrap.classList.add('lit'); }, (t + 0.6) * 1000);

  document.getElementById('date-text').textContent = C.date.toUpperCase();

  // ---- ambient embers from the flame ----
  const wrap = document.getElementById('candle-wrap');
  let emberTimer = null;
  function spawnEmber(){
    const e = document.createElement('div');
    e.className = 'ember';
    wrap.appendChild(e);
    const drift = (Math.random()-0.5)*24;
    e.animate([
      { transform: 'translate(-50%,0) scale(1)', opacity: 0 },
      { opacity: 0.9, offset: 0.2 },
      { transform: 'translate(calc(-50% + '+drift+'px), -70px) scale(0.4)', opacity: 0 }
    ], { duration: 1600 + Math.random()*800, easing: 'ease-out' });
    setTimeout(function(){ e.remove(); }, 2600);
  }
  if(!reduce){ emberTimer = setInterval(spawnEmber, 650); }

  // ---- candle interaction ----
  const flame = document.getElementById('flame');
  const flameOuter = document.getElementById('flame-outer');
  const flameCore = document.getElementById('flame-core');
  const glow = document.getElementById('glow');
  const halo = document.getElementById('halo');
  const body = document.getElementById('candle-body');
  const heroCat = document.getElementById('hero-cat');
  const hint = document.getElementById('hint');
  const wish = document.getElementById('wish');
  const constellation = document.getElementById('constellation');
  const catLines = document.querySelectorAll('.cat-line');
  const flash = document.getElementById('flash');
  const burst = document.getElementById('burst');
  const palette = ['#c9a668','#e4cd9a','#fff6dd','#7f92aa','#f3ecd9'];
  let blown = false;

  function fireConfetti(){
    const cx = window.innerWidth/2;
    const cy = window.innerHeight*0.42;
    const N = 50;
    for(let i=0;i<N;i++){
      const kind = i % 5;
      const el = document.createElement('div');
      if(kind === 0){ el.className = 'glyph-bit'; el.textContent = '\u2665'; }
      else if(kind === 2){ el.className = 'glyph-bit'; el.textContent = '\uD83D\uDC3E'; }
      else { el.className = 'confetti'; el.style.background = palette[i % palette.length]; }
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      burst.appendChild(el);
      const angle = (Math.PI * 2 * i / N) + (Math.random()-0.5)*0.5;
      const power = 120 + Math.random()*220;
      const dx = Math.cos(angle) * power;
      const dyUp = Math.sin(angle) * power - (120 + Math.random()*120);
      const fall = window.innerHeight * (0.5 + Math.random()*0.5);
      const rot = (Math.random()*720 - 360);
      const dur = 1700 + Math.random()*1400;
      el.animate([
        { transform: 'translate(-50%,-50%) rotate(0deg)', opacity: 1 },
        { transform: 'translate(calc(-50% + '+dx+'px), calc(-50% + '+dyUp+'px)) rotate('+(rot*0.4)+'deg)', opacity: 1, offset: 0.35 },
        { transform: 'translate(calc(-50% + '+(dx*1.2)+'px), calc(-50% + '+(dyUp+fall)+'px)) rotate('+rot+'deg)', opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(.2,.6,.3,1)' });
      setTimeout(function(){ el.remove(); }, dur + 100);
    }
  }

  wrap.addEventListener('click', function(){
    if(blown) return;
    blown = true;
    if(emberTimer){ clearInterval(emberTimer); }

    flame.style.opacity = '0';
    flame.style.transform = 'translate(-50%,0) scaleY(0.2)';
    flameOuter.style.opacity = '0';
    flameCore.style.opacity = '0';
    glow.style.opacity = '0';
    halo.style.opacity = '0';
    body.classList.add('dim');
    heroCat.classList.add('dim');
    hint.style.opacity = '0';

    if(!reduce){
      flash.animate([{ opacity: 0 },{ opacity: 1, offset: 0.15 },{ opacity: 0 }],
        { duration: 700, easing: 'ease-out' });
      fireConfetti();
    }

    for(let i=0;i<5;i++){
      const sm = document.createElement('div');
      sm.className = 'smoke'; sm.style.opacity = '0.5';
      wrap.appendChild(sm);
      const drift = (Math.random()-0.5)*40;
      sm.animate([
        { transform: 'translate(-50%,0) scale(1)', opacity: 0.5 },
        { transform: 'translate(calc(-50% + '+drift+'px), -80px) scale(2.5)', opacity: 0 }
      ], { duration: 1800 + i*200, easing: 'ease-out', delay: i*80 });
    }

    for(let i=0;i<12;i++){
      const sp = document.createElement('div');
      sp.className = 'sparkle';
      wrap.appendChild(sp);
      const angle = (Math.PI*2*i/12) + Math.random()*0.3;
      const dist = 40 + Math.random()*30;
      const dx = Math.cos(angle)*dist;
      const dy = Math.sin(angle)*dist - 20;
      sp.animate([
        { transform: 'translate(-50%,0) scale(0)', opacity: 1 },
        { transform: 'translate(calc(-50% + '+dx+'px), '+dy+'px) scale(1)', opacity: 0 }
      ], { duration: 900 + Math.random()*400, easing: 'ease-out', delay: i*15 });
      setTimeout(function(){ sp.remove(); }, 1500);
    }

    setTimeout(function(){ wish.classList.add('show'); }, 500);
    setTimeout(function(){
      constellation.classList.add('show');
      catLines.forEach(function(ln, i){
        ln.style.strokeDasharray = '80';
        ln.style.strokeDashoffset = '80';
        ln.animate([{ strokeDashoffset: 80 },{ strokeDashoffset: 0 }],
          { duration: 700, easing: 'ease-in-out', delay: i*120, fill: 'forwards' });
        setTimeout(function(){ ln.style.strokeDashoffset = '0'; }, i*120 + 650);
      });
    }, 1100);
  });

  // ---- reasons ----
  const reasonsList = document.getElementById('reasons-list');
  C.reasons.forEach(function(rn, i){
    const div = document.createElement('div');
    div.className = 'reason';
    div.style.transitionDelay = (i*0.08) + 's';
    div.innerHTML = '<div class="mark">&#8220;</div><p>' + rn + '</p>';
    reasonsList.appendChild(div);
  });

  // ---- final message ----
  document.getElementById('final-message').textContent = C.message;
  document.getElementById('final-signoff').textContent = C.signOff;

  // ---- envelope / letter (+ floating cats & paws) ----
  const envelope = document.getElementById('envelope');
  const envelopeHint = document.getElementById('envelope-hint');
  const envWrap = document.getElementById('envelope-wrap');
  const floaters = ['\u2665','\uD83D\uDC3E','\uD83D\uDC31','\uD83D\uDC3E'];
  function floatCats(){
    if(reduce) return;
    for(let i=0;i<10;i++){
      const h = document.createElement('div');
      h.textContent = floaters[i % floaters.length];
      h.style.position = 'absolute';
      h.style.left = (34 + Math.random()*32) + '%';
      h.style.top = '46%';
      h.style.fontSize = (13 + Math.random()*13) + 'px';
      h.style.pointerEvents = 'none';
      h.style.zIndex = '7';
      h.style.textShadow = '0 0 8px rgba(228,205,154,0.45)';
      envWrap.appendChild(h);
      const dx = (Math.random()-0.5)*140;
      h.animate([
        { transform: 'translate(0,0) scale(0.4)', opacity: 0 },
        { transform: 'translate('+(dx*0.5)+'px,-70px) scale(1)', opacity: 1, offset: 0.4 },
        { transform: 'translate('+dx+'px,-180px) scale(0.7)', opacity: 0 }
      ], { duration: 2300 + Math.random()*900, easing: 'ease-out', delay: i*70 });
      setTimeout(function(){ h.remove(); }, 3400);
    }
  }
  envelope.addEventListener('click', function(){
    const isOpen = envelope.classList.toggle('open');
    envelopeHint.classList.toggle('hidden', isOpen);
    envelopeHint.textContent = isOpen ? 'tap to close' : 'tap to open the letter';
    if(isOpen) setTimeout(floatCats, 420);
  });

  // ---- scroll reveal ----
  const revealTargets = document.querySelectorAll('.reveal, .reason');
  if(reduce){
    revealTargets.forEach(function(el){ el.classList.add('in'); });
  } else {
    const io = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          entry.target.classList.add('in');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    revealTargets.forEach(function(el){ io.observe(el); });
  }

})();
</script>

</body>
</html>
