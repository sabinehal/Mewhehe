<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>happy birthday, smol</title>
<style>
  /* ============ CONFIG — edit these to personalize ============ */
  /* Photos: paste image URLs (or base64 data URLs) into these arrays.
     Leave empty for a soft placeholder. */
</style>
</head>
<body>

<script>
  window.CONFIG = {
    name: "Jory",
    nickname: "smol",
    date: "July 5",
    // Add photo URLs here — as many as you like, they'll be placed in order.
    photosMe: [],
    photosSmol: [],
    // Reasons — edit freely, add or remove as many as you want.
    reasons: [
      "The way you say goodnight even when it's already morning for me.",
      "You remember the small things I mention once.",
      "Every time zone math is worth it.",
      "Your laugh over a bad connection still sounds like home.",
      "You make far away feel temporary."
    ],
    // The final message — write this yourself. Say the real thing.
    message: "Happy birthday, smol.\n\nEDIT — write a few honest sentences here. Say the thing you'd actually say if she were sitting right next to you.",
    signOff: "always"
  };
</script>

<style>
  :root{
    --ink: #eef1f6;
    --ink-dim: #aab4c4;
    --night: #0e1420;
    --night-2: #141c2c;
    --dusk-blue: #7f92aa;
    --gold: #c9a668;
    --gold-soft: #e4cd9a;
    --line: rgba(238,241,246,0.12);
    --serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono: 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0;
    background: radial-gradient(ellipse 120% 80% at 50% -10%, #1a2436 0%, var(--night) 55%, #090d15 100%);
    color: var(--ink);
    font-family: var(--sans);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ambient starfield */
  #stars{
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  #stars span{
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: #fff; opacity: 0.5;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity: 0.15; }
    50%{ opacity: 0.85; }
  }

  section{
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 90px 24px;
    text-align: center;
  }

  @keyframes riseIn{
    from{ opacity: 0; transform: translateY(22px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .eyebrow{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--dusk-blue);
    margin-bottom: 22px;
    opacity: 0;
    animation: riseIn 0.9s ease forwards;
    animation-delay: 0.1s;
  }

  h1.title{
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(48px, 11vw, 96px);
    line-height: 1.05;
    margin: 0 0 8px 0;
    color: var(--ink);
    opacity: 0;
    animation: riseIn 1s ease forwards;
    animation-delay: 0.3s;
  }
  h1.title .nick{
    font-style: italic;
    color: var(--gold-soft);
    display: inline-block;
    animation: nickGlow 3.5s ease-in-out infinite;
    animation-delay: 2s;
  }
  @keyframes nickGlow{
    0%,100%{ text-shadow: 0 0 0px rgba(228,205,154,0); }
    50%{ text-shadow: 0 0 18px rgba(228,205,154,0.5); }
  }
  h1.title .quote{ color: var(--dusk-blue); opacity: 0.6; }

  .date{
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    margin-bottom: 64px;
    opacity: 0;
    animation: riseIn 1s ease forwards;
    animation-delay: 0.55s;
    position: relative;
  }
  .date::after{
    content:'';
    display: block;
    width: 0;
    height: 1px;
    background: var(--dusk-blue);
    margin: 14px auto 0;
    opacity: 0.5;
    animation: growLine 1s ease forwards;
    animation-delay: 1.1s;
  }
  @keyframes growLine{
    to{ width: 40px; }
  }

  /* ---------- candle ---------- */
  #candle-wrap{
    position: relative;
    width: 140px;
    height: 220px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    opacity: 0;
    animation: riseIn 1.1s ease forwards, floatCandle 5s ease-in-out infinite;
    animation-delay: 0.8s, 2s;
    transition: transform 0.2s ease;
  }
  #candle-wrap:active{ transform: scale(0.96); }
  @keyframes floatCandle{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-6px); }
  }
  .glow{
    position: absolute; left: 50%; top: 8px;
    width: 90px; height: 90px;
    transform: translate(-50%,-50%);
    background: radial-gradient(circle, rgba(228,205,154,0.55) 0%, rgba(228,205,154,0) 70%);
    border-radius: 50%;
    transition: opacity 0.6s ease;
    filter: blur(2px);
  }
  .flame{
    position: absolute; left: 50%; top: 6px;
    width: 14px; height: 34px;
    transform: translate(-50%,0);
    background: linear-gradient(180deg, #fff6dd 0%, var(--gold-soft) 45%, var(--gold) 80%);
    border-radius: 50% 50% 50% 50% / 65% 65% 40% 40%;
    transform-origin: bottom center;
    animation: flicker 2.4s ease-in-out infinite;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  @keyframes flicker{
    0%,100%{ transform: translate(-50%,0) scaleY(1) rotate(0deg); }
    30%{ transform: translate(-52%,0) scaleY(1.05) rotate(-2deg); }
    60%{ transform: translate(-48%,0) scaleY(0.96) rotate(2deg); }
  }
  .wick{
    position: absolute; left: 50%; top: 30px; width: 3px; height: 12px;
    background: #3a3226; transform: translateX(-50%);
  }
  .candle-body{
    position: absolute; left: 50%; top: 40px; bottom: 0; width: 46px;
    transform: translateX(-50%);
    background: linear-gradient(90deg, #fdfaf3 0%, #f3ecd9 45%, #e6dcc2 100%);
    border-radius: 6px 6px 3px 3px;
    box-shadow: inset -6px 0 10px rgba(0,0,0,0.06);
  }
  .candle-body::before{
    content:''; position:absolute; top:-6px; left:0; right:0; height:12px;
    background: #fdfaf3; border-radius: 50%;
  }
  .smoke{
    position: absolute; left: 50%; top: 0; width: 6px; height: 6px;
    border-radius: 50%; background: rgba(200,200,210,0.5);
    opacity: 0; transform: translate(-50%,0);
  }
  .hint{
    margin-top: 26px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
    opacity: 0;
    transition: opacity 0.6s ease;
    animation: hintFade 2s ease infinite;
    animation-delay: 1.6s;
  }
  @keyframes hintFade{
    0%,100%{ opacity: 0.35; }
    50%{ opacity: 0.85; }
  }
  .sparkle{
    position: absolute; left: 50%; top: 10px;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--gold-soft);
    box-shadow: 0 0 6px 1px rgba(228,205,154,0.8);
    pointer-events: none;
  }

  /* wish reveal */
  #wish{
    max-width: 480px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 1s ease, transform 1s ease;
    margin-top: 30px;
  }
  #wish.show{ opacity: 1; transform: translateY(0); }
  #wish p{
    font-family: var(--serif);
    font-style: italic;
    font-size: 19px;
    line-height: 1.6;
    color: var(--dusk-blue);
    margin: 0;
  }

  .constellation{
    margin-top: 40px;
    opacity: 0;
    transition: opacity 1.4s ease 0.3s;
  }
  .constellation.show{ opacity: 1; }
  .constellation svg{ width: 220px; height: 90px; }

  /* ---------- section headers ---------- */
  .reveal{
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .reveal.in{
    opacity: 1;
    transform: translateY(0);
  }

  .section-label{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  h2.section-title{
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(30px, 6vw, 46px);
    margin: 0 0 60px 0;
    color: var(--ink);
  }
  .sub{
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-dim);
    font-size: 16px;
    margin-top: -46px;
    margin-bottom: 60px;
  }

  /* ---------- reasons ---------- */
  .reasons{
    max-width: 640px;
    width: 100%;
    display: flex; flex-direction: column; gap: 0;
  }
  .reason{
    display: flex; gap: 20px; align-items: flex-start;
    text-align: left;
    padding: 26px 4px;
    border-top: 1px solid var(--line);
    opacity: 0;
    transform: translateX(-16px);
    transition: opacity 0.7s ease, transform 0.7s ease, background 0.3s ease;
  }
  .reason.in{ opacity: 1; transform: translateX(0); }
  .reason:hover{ background: rgba(255,255,255,0.02); }
  .reason:last-child{ border-bottom: 1px solid var(--line); }
  .reason .mark{
    font-family: var(--serif);
    font-style: italic;
    font-size: 26px;
    color: var(--gold);
    line-height: 1;
    flex-shrink: 0;
    width: 20px;
    transition: transform 0.3s ease, color 0.3s ease;
  }
  .reason:hover .mark{
    transform: scale(1.25) rotate(-6deg);
    color: var(--gold-soft);
  }
  .reason p{
    font-family: var(--serif);
    font-size: 19px;
    line-height: 1.5;
    color: var(--ink);
    margin: 0;
  }

  /* ---------- moments / photos ---------- */
  .moments-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    max-width: 640px;
    width: 100%;
  }
  @media (max-width: 560px){
    .moments-grid{ grid-template-columns: 1fr; }
  }
  .moment-col{ display:flex; flex-direction:column; gap:14px; }
  .moment-label{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dusk-blue);
    text-align: left;
    margin-bottom: 2px;
  }
  .photo{
    aspect-ratio: 4/5;
    border-radius: 10px;
    background: var(--night-2);
    border: 1px dashed var(--line);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
    opacity: 0;
    transform: translateY(24px) scale(0.97);
    transition: opacity 0.7s ease, transform 0.5s ease, border-color 0.3s ease;
  }
  .photo.in{ opacity: 1; transform: translateY(0) scale(1); }
  .photo:hover{ border-color: var(--gold); transform: translateY(-4px) scale(1.015); }
  .photo img{ width: 100%; height: 100%; object-fit: cover; display:block; transition: transform 0.6s ease; }
  .photo:hover img{ transform: scale(1.06); }
  .photo .placeholder-text{
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-dim);
    text-align: center;
    letter-spacing: 0.05em;
    padding: 0 16px;
    line-height: 1.6;
    opacity: 0.6;
  }

  /* ---------- final message ---------- */
  .final-label{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--dusk-blue);
    margin-bottom: 30px;
  }
  .message{
    max-width: 540px;
    font-family: var(--serif);
    font-size: clamp(20px, 3.6vw, 26px);
    line-height: 1.7;
    color: var(--ink);
    white-space: pre-line;
  }
  .signoff{
    margin-top: 46px;
    font-family: var(--serif);
    font-style: italic;
    color: var(--gold-soft);
    font-size: 20px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 1s ease 0.4s, transform 1s ease 0.4s;
  }
  .signoff.in{ opacity: 1; transform: translateY(0); }

  /* ---------- envelope + letter ---------- */
  #envelope-wrap{
    perspective: 1400px;
    margin-top: 10px;
  }
  .envelope{
    position: relative;
    width: 280px;
    max-width: 78vw;
    height: 190px;
    margin: 0 auto;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.6s ease;
  }
  .envelope.open{ transform: translateY(6px) scale(0.97); }

  .env-back{
    position: absolute; inset: 0;
    background: linear-gradient(155deg, #1c2536, #131b2a);
    border: 1px solid var(--line);
    border-radius: 6px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.4);
    z-index: 1;
  }
  .env-pocket{
    position: absolute; left: 0; right: 0; bottom: 0; height: 100%;
    background: linear-gradient(155deg, #232f45, #182233);
    clip-path: polygon(0 100%, 50% 40%, 100% 100%);
    border-radius: 0 0 6px 6px;
    z-index: 3;
  }
  .env-flap{
    position: absolute; top: 0; left: 0; width: 0; height: 0;
    border-left: 140px solid transparent;
    border-right: 140px solid transparent;
    border-top: 90px solid #29354d;
    transform-origin: top center;
    transition: transform 1s cubic-bezier(.6,0,.3,1);
    z-index: 4;
  }
  .envelope.open .env-flap{
    transform: rotateX(180deg);
    z-index: 0;
  }
  .seal{
    position: absolute; top: 32px; left: 50%; transform: translate(-50%,0);
    width: 34px; height: 34px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-soft), var(--gold) 70%);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: #3a2c12;
    box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    z-index: 5;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .envelope.open .seal{ opacity: 0; transform: translate(-50%,0) scale(0.5); }

  .letter-card{
    position: absolute;
    left: 50%; bottom: 14px;
    width: 88%;
    min-height: 130px;
    transform: translate(-50%, 0) scale(0.92);
    background: linear-gradient(180deg, #f7f3ea, #efe8d6);
    border-radius: 4px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.45);
    padding: 26px 22px 22px;
    z-index: 2;
    opacity: 0;
    transition: transform 0.8s cubic-bezier(.6,0,.3,1) 0.35s, opacity 0.5s ease 0.35s, bottom 0.8s cubic-bezier(.6,0,.3,1) 0.35s;
  }
  .envelope.open .letter-card{
    opacity: 1;
    bottom: 96px;
    transform: translate(-50%, 0) scale(1);
    z-index: 6;
  }
  .letter-card .message{
    color: #2a2620;
    text-align: left;
    font-size: clamp(15px, 3.6vw, 18px);
    line-height: 1.65;
  }
  .letter-card .signoff{
    color: #7a5f2c;
    text-align: left;
    margin-top: 24px;
    font-size: 17px;
    opacity: 1;
    transform: none;
    transition: none;
  }
  .envelope-hint{
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-align: center;
    animation: hintFade 2s ease infinite;
    transition: opacity 0.5s ease;
  }
  .envelope-hint.hidden{ opacity: 0; }
  .signoff::before{
    content: '—  ';
  }

  footer{
    text-align: center;
    padding: 40px 24px 60px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    opacity: 0.35;
  }
</style>
</head>
<body>

<div id="stars"></div>

<!-- HERO -->
<section id="hero">
  <div class="eyebrow">Happy Birthday</div>
  <h1 class="title" id="title-text"></h1>
  <div class="date" id="date-text"></div>

  <div id="candle-wrap">
    <div class="glow" id="glow"></div>
    <div class="flame" id="flame"></div>
    <div class="wick"></div>
    <div class="candle-body"></div>
  </div>
  <div class="hint" id="hint">tap the candle &amp; make a wish</div>

  <div id="wish">
    <p>Wherever you are, whatever the time there — happy birthday, smol.</p>
  </div>
  <div class="constellation" id="constellation">
    <svg viewBox="0 0 220 90">
      <circle cx="30" cy="60" r="3" fill="#e4cd9a"/>
      <circle cx="190" cy="30" r="3" fill="#e4cd9a"/>
      <line id="conn-line" x1="30" y1="60" x2="30" y2="60" stroke="#7f92aa" stroke-width="1" stroke-dasharray="3,4"/>
    </svg>
  </div>
</section>

<!-- REASONS -->
<section id="reasons-section">
  <div class="section-label reveal">Our Little History</div>
  <h2 class="section-title reveal">a few reasons why</h2>
  <div class="reasons" id="reasons-list"></div>
</section>

<!-- MOMENTS -->
<section id="moments-section">
  <div class="section-label reveal">Keepsakes</div>
  <h2 class="section-title reveal">moments</h2>
  <div class="sub reveal">a few of us, from wherever we were</div>
  <div class="moments-grid">
    <div class="moment-col">
      <div class="moment-label">me</div>
      <div id="col-me"></div>
    </div>
    <div class="moment-col">
      <div class="moment-label">smol</div>
      <div id="col-smol"></div>
    </div>
  </div>
</section>

<!-- FINAL -->
<section id="final-section">
  <div class="final-label reveal">Made With Love, Just For You</div>
  <div id="envelope-wrap">
    <div class="envelope" id="envelope">
      <div class="env-back"></div>
      <div class="letter-card">
        <div class="message" id="final-message"></div>
        <div class="signoff" id="final-signoff"></div>
      </div>
      <div class="env-pocket"></div>
      <div class="env-flap"></div>
      <div class="seal">&#9825;</div>
    </div>
  </div>
  <div class="envelope-hint" id="envelope-hint">tap to open the letter</div>
</section>

<footer>ONE MORE YEAR AROUND THE SUN</footer>

<script>
(function(){
  const C = window.CONFIG;

  // ---- starfield ----
  const starsEl = document.getElementById('stars');
  for(let i=0;i<70;i++){
    const s = document.createElement('span');
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    s.style.animationDelay = (Math.random()*4) + 's';
    s.style.width = s.style.height = (Math.random()*1.5+1) + 'px';
    starsEl.appendChild(s);
  }

  // ---- title / date ----
  document.getElementById('title-text').innerHTML =
    C.name + ' <span class="quote">"</span><span class="nick">' + C.nickname + '</span><span class="quote">"</span>';
  document.getElementById('date-text').textContent = C.date.toUpperCase();

  // ---- candle interaction ----
  const wrap = document.getElementById('candle-wrap');
  const flame = document.getElementById('flame');
  const glow = document.getElementById('glow');
  const hint = document.getElementById('hint');
  const wish = document.getElementById('wish');
  const constellation = document.getElementById('constellation');
  const connLine = document.getElementById('conn-line');
  let blown = false;

  wrap.addEventListener('click', function(){
    if(blown) return;
    blown = true;
    flame.style.opacity = '0';
    flame.style.transform = 'translate(-50%,0) scaleY(0.2)';
    glow.style.opacity = '0';
    hint.style.opacity = '0';

    // smoke wisp
    for(let i=0;i<5;i++){
      const sm = document.createElement('div');
      sm.className = 'smoke';
      sm.style.opacity = '0.5';
      wrap.appendChild(sm);
      const drift = (Math.random()-0.5)*40;
      sm.animate([
        { transform: 'translate(-50%,0) scale(1)', opacity: 0.5 },
        { transform: `translate(calc(-50% + ${drift}px), -80px) scale(2.5)`, opacity: 0 }
      ], { duration: 1800 + i*200, easing: 'ease-out', delay: i*80 });
    }

    // sparkle burst outward from the wick
    for(let i=0;i<12;i++){
      const sp = document.createElement('div');
      sp.className = 'sparkle';
      wrap.appendChild(sp);
      const angle = (Math.PI*2*i/12) + Math.random()*0.3;
      const dist = 40 + Math.random()*30;
      const dx = Math.cos(angle)*dist;
      const dy = Math.sin(angle)*dist - 20;
      sp.animate([
        { transform: 'translate(-50%,0) scale(0)', opacity: 1 },
        { transform: `translate(calc(-50% + ${dx}px), ${dy}px) scale(1)`, opacity: 0 }
      ], { duration: 900 + Math.random()*400, easing: 'ease-out', delay: i*15 });
      setTimeout(()=> sp.remove(), 1500);
    }

    setTimeout(function(){
      wish.classList.add('show');
    }, 500);
    setTimeout(function(){
      constellation.classList.add('show');
      connLine.animate(
        [ {x2:30, y2:60}, {x2:190, y2:30} ],
        { duration: 1200, easing: 'ease-in-out', fill: 'forwards' }
      );
    }, 1100);
  });

  // ---- reasons ----
  const reasonsList = document.getElementById('reasons-list');
  C.reasons.forEach(function(r, i){
    const div = document.createElement('div');
    div.className = 'reason';
    div.style.transitionDelay = (i*0.08) + 's';
    div.innerHTML = '<div class="mark">&#8220;</div><p>' + r + '</p>';
    reasonsList.appendChild(div);
  });

  // ---- photos ----
  function buildPhotoCol(containerId, photos){
    const container = document.getElementById(containerId);
    const count = Math.max(photos.length, 2);
    for(let i=0;i<count;i++){
      const p = document.createElement('div');
      p.className = 'photo';
      p.style.transitionDelay = (i*0.1) + 's';
      if(photos[i]){
        const img = document.createElement('img');
        img.src = photos[i];
        p.appendChild(img);
      } else {
        p.innerHTML = '<div class="placeholder-text">drop a photo here<br>(edit CONFIG.photosMe / photosSmol)</div>';
      }
      container.appendChild(p);
    }
  }
  buildPhotoCol('col-me', C.photosMe);
  buildPhotoCol('col-smol', C.photosSmol);

  // ---- final message ----
  document.getElementById('final-message').textContent = C.message;
  document.getElementById('final-signoff').textContent = C.signOff;

  // ---- envelope / letter ----
  const envelope = document.getElementById('envelope');
  const envelopeHint = document.getElementById('envelope-hint');
  envelope.addEventListener('click', function(){
    const isOpen = envelope.classList.toggle('open');
    envelopeHint.classList.toggle('hidden', isOpen);
    envelopeHint.textContent = isOpen ? 'tap to close' : 'tap to open the letter';
  });

  // ---- scroll reveal ----
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const revealTargets = document.querySelectorAll('.reveal, .reason, .photo');
  if(prefersReducedMotion){
    revealTargets.forEach(el => el.classList.add('in'));
  } else {
    const io = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(entry.isIntersecting){
          entry.target.classList.add('in');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    revealTargets.forEach(el => io.observe(el));
  }

})();
</script>

</body>
</html>
